version: 0.0
os: linux
files:
  - source: /
    destination: /home/ec2-user/CI-CD-AWS-Project
file_exists_behavior: OVERWRITE
hooks:
  BeforeInstall:
    - location: scripts/stop.sh
      timeout: 30
      runas: ec2-user
  AfterInstall:
    - location: scripts/install.sh
      timeout: 60
      runas: ec2-user
  ApplicationStart:
    - location: scripts/start.sh
      timeout: 60
      runas: ec2-user